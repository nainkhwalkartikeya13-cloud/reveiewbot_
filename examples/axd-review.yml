# ============================================================
# AXD AI Code Review
# ============================================================
# Automatically reviews every Pull Request using Claude AI.
# Posts inline suggestions and a summary comment.
#
# Setup:
#   1. Add ANTHROPIC_API_KEY to repo secrets
#   2. That's it — GITHUB_TOKEN is provided automatically
# ============================================================

name: AXD Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    # Skip draft PRs and bot PRs
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'

    steps:
      - name: AXD Review
        uses: KartikeyaNainkhwal/reviewbot@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional overrides:
          # severity-threshold: 'medium'        # critical | high | medium | low
          # ignore-paths: '*.lock,dist/**'      # comma-separated globs
          # fail-on-critical: 'true'            # block merge on critical issues
          # max-files: '30'                     # max files to review
          # custom-rules: 'Check for SQL injection,Ensure error handling'
