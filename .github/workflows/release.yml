name: Build and Release Action

on:
  push:
    branches: [main]
    paths:
      - 'src/action.ts'
      - 'action.yml'
      - 'scripts/build-action.mjs'
      - 'package.json'

permissions:
  contents: write

jobs:
  build-and-release:
    name: 📦 Build & Tag Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build action bundle
        run: npm run build:action

      - name: Verify bundle exists
        run: |
          if [ ! -f dist/action.js ]; then
            echo "❌ dist/action.js not found"
            exit 1
          fi
          echo "✅ Bundle size: $(wc -c < dist/action.js) bytes"

      - name: Commit dist/action.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/action.js
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: rebuild action bundle [skip ci]" && git push)

      - name: Update v1 tag
        run: |
          git tag -fa v1 -m "Release v1 — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin v1 --force
          echo "✅ Tagged v1 at $(git rev-parse HEAD)"
